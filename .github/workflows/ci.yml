name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Install MPI
      run: |
        brew install open-mpi
        mpirun --version

    - name: Swift Version
      run: swift --version

    - name: Build
      run: swift build -v

    - name: Run Tests
      run: swift test -v

  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    container:
      image: swift:5.9
    steps:
    - uses: actions/checkout@v4

    - name: Install MPI
      run: |
        apt-get update
        apt-get install -y libopenmpi-dev openmpi-bin
        mpirun --version

    - name: Swift Version
      run: swift --version

    - name: Build
      run: swift build -v

    - name: Run Tests
      run: swift test -v

  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Run SwiftLint
      run: swiftlint lint --strict

  documentation:
    name: Build Documentation
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Build Documentation
      run: |
        swift package --allow-writing-to-directory ./docs \
          generate-documentation --target MessageDifferentiationKit \
          --output-path ./docs
